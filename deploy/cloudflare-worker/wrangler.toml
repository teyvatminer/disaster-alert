name = "earthquake-alert"
main = "index.js"
compatibility_date = "2025-12-28"

# 静态资产配置
[assets]
directory = "../../web"

# 本地开发环境变量；生产部署必须显式选择 env 并配置 HTTPS 后端。
[env.development.vars]
BACKEND_URL = "http://localhost:30010"
ALLOWED_ORIGINS = "http://localhost:8787"

[env.production.vars]
BACKEND_URL = "https://your-backend-server.com"
ALLOWED_ORIGINS = "https://eew.example.com"


services:
  disaster-alert:
    build:
      context: ..
      dockerfile: Dockerfile
    image: disaster-alert:local
    env_file:
      - .env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    volumes:
      - disaster-data:/data
    expose:
      - "30010"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:30010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 256m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?SITE_DOMAIN must be set}
    restart: unless-stopped
    depends_on:
      disaster-alert:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  disaster-data:
  caddy-data:
  caddy-config:

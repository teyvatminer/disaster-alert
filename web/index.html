<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wolfx 地震预警订阅</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230071e3'/%3E%3Cpath d='M7 36h10l7-16 12 28 9-21 6 9h6' stroke='white' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQjR6N9aXkP8+/7I9S7y+4C5V5H1gYA=" crossorigin="anonymous" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, .94);
      --text: #1d1d1f;
      --muted: #86868b;
      --line: #d2d2d7;
      --primary: #0071e3;
      --primary-strong: #005bb5;
      --soft: rgba(118, 118, 128, .12);
      --ok-bg: #e7f7ed;
      --ok: #087443;
      --err-bg: #fde8e7;
      --err: #b42318;
      --info-bg: #eaf3ff;
      --info: #175cd3;
      --warn-bg: #fff3d6;
      --warn: #9a5b00;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --panel: rgba(28, 28, 30, .94);
        --text: #f5f5f7;
        --muted: #86868b;
        --line: #38383a;
        --primary: #2997ff;
        --primary-strong: #0077ed;
        --soft: rgba(118, 118, 128, .24);
        --ok-bg: rgba(8, 116, 67, .2);
        --err-bg: rgba(180, 35, 24, .22);
        --info-bg: rgba(23, 92, 211, .22);
        --warn-bg: rgba(154, 91, 0, .22);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(760px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }
    header {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }
    .topline {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #17b26a;
      box-shadow: 0 0 0 4px rgba(23, 178, 106, .15);
    }
    .subhead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(0, 113, 227, .08);
    }
    .section-title {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.3;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 760;
    }
    input, select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 13px;
      background: color-mix(in srgb, var(--panel) 88%, var(--bg));
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
    }
    small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.45;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    #map {
      height: 315px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--soft);
      margin-bottom: 12px;
    }
    @media (prefers-color-scheme: dark) {
      .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(92%) contrast(90%); }
    }
    .location-toolbar, .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .locations-list {
      display: grid;
      gap: 8px;
      margin: 12px 0 18px;
    }
    .location-item, .locations-empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--soft) 72%, transparent);
    }
    .location-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 56px;
      padding: 9px 10px;
    }
    .locations-empty {
      border-style: dashed;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .location-name {
      font-weight: 820;
      line-height: 1.25;
      word-break: break-word;
    }
    .location-coords {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }
    .remove-location, .remove-rule, .level-test {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 8px;
      padding: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-weight: 900;
    }
    .remove-location { color: var(--err); background: var(--err-bg); }
    .notify-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: visible;
      background: color-mix(in srgb, var(--panel) 94%, var(--bg));
      margin-bottom: 18px;
    }
    .threshold-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--soft) 62%, transparent);
    }
    .setting-title { font-weight: 850; line-height: 1.25; }
    .setting-note { margin-top: 4px; color: var(--muted); font-size: 13px; line-height: 1.4; }
    .notify-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .rule-rows { display: grid; }
    .rule-row {
      display: grid;
      grid-template-columns: minmax(170px, 1fr) minmax(190px, 1fr) 38px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
    }
    .rule-row:first-child { border-top: 0; }
    .range-fields {
      display: grid;
      grid-template-columns: minmax(50px, 70px) auto minmax(50px, 70px);
      gap: 7px;
      align-items: center;
    }
    .range-fields span {
      color: var(--muted);
      font-weight: 850;
      text-align: center;
      white-space: nowrap;
    }
    .range-fields input {
      height: 36px;
      text-align: center;
      font-weight: 850;
      padding: 0 6px;
      background: var(--panel);
    }
    .band-select { height: 38px; font-weight: 820; }
    .level-passive { color: #344054; background: #eef2f6; }
    .level-active { color: #175cd3; background: #eff6ff; }
    .level-critical { color: #b42318; background: #fff1f0; }
    .notify-warning {
      display: none;
      padding: 10px 12px;
      border-top: 1px solid rgba(0, 113, 227, .16);
      color: var(--err);
      background: rgba(0, 113, 227, .07);
      font-size: 13px;
      font-weight: 760;
      line-height: 1.4;
    }
    .notify-warning.show { display: block; }
    button {
      height: 48px;
      border: 0;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 760;
      cursor: pointer;
      color: var(--text);
      background: var(--soft);
    }
    button.primary { background: var(--primary); color: #fff; }
    button.primary:hover { background: var(--primary-strong); }
    button:disabled { opacity: .65; cursor: wait; }
    .status {
      display: none;
      margin: 0 0 16px;
      padding: 13px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }
    .status.visible { display: block; }
    .status.success { color: var(--ok); background: var(--ok-bg); }
    .status.error { color: var(--err); background: var(--err-bg); }
    .status.info { color: var(--info); background: var(--info-bg); }
    .status.warning { color: var(--warn); background: var(--warn-bg); }
    footer { margin-top: 18px; color: var(--muted); font-size: 12px; line-height: 1.6; text-align: center; }
    a { color: inherit; }
    @media (max-width: 640px) {
      main { padding-top: 22px; }
      .topline { gap: 8px; }
      h1 { font-size: clamp(24px, 6.4vw, 30px); line-height: 1.12; }
      .badge { min-height: 32px; padding: 0 10px; font-size: 12px; }
      .panel { padding: 16px; }
      .grid, .location-toolbar, .actions, .threshold-row { grid-template-columns: 1fr; }
      input, select { font-size: 16px; }
      #map { height: 270px; }
      .notify-actions { justify-content: stretch; }
      .notify-actions button { flex: 1 1 0; }
      .rule-row { grid-template-columns: 1fr 1fr 38px; gap: 6px; padding: 8px 6px; }
      .range-fields { grid-template-columns: minmax(0, 1fr) 14px minmax(0, 1fr); gap: 2px; }
      .range-fields input { padding: 0 3px; }
      .band-select { min-width: 0; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="topline">
        <h1>Wolfx 预警订阅</h1>
        <div class="badge"><span class="dot"></span><span id="stats">状态未知</span></div>
      </div>
      <p class="subhead">地震预警通过 Bark 推送到当前设备</p>
    </header>

    <section class="panel">
      <h2 class="section-title">订阅配置</h2>
      <div id="status" class="status" role="alert" aria-live="polite"></div>
      <form id="subscribe-form">
        <div class="field">
          <label for="bark-id">Bark Key</label>
          <input id="bark-id" type="text" autocomplete="off" maxlength="64" required placeholder="例如 JP8S9..." />
        </div>

        <div class="field">
          <label>监测地点</label>
          <div id="map"></div>
          <div class="grid">
            <input id="location-name" type="text" maxlength="80" placeholder="地点名称" />
            <div class="grid">
              <input id="latitude" type="number" step="0.0001" min="-90" max="90" placeholder="纬度" />
              <input id="longitude" type="number" step="0.0001" min="-180" max="180" placeholder="经度" />
            </div>
          </div>
        </div>
        <div class="location-toolbar">
          <button type="button" id="locate">定位当前位置</button>
          <button type="button" id="add-location">添加当前地点</button>
        </div>
        <div id="locations-list" class="locations-list"></div>

        <div class="notify-card">
          <div class="threshold-row">
            <div>
              <div class="setting-title">通知级别规则</div>
              <div class="setting-note">每次保存都会覆盖服务器上的订阅配置</div>
            </div>
            <div class="notify-actions">
              <button type="button" id="add-rule">添加规则</button>
              <button type="button" id="reset-rules">重置</button>
            </div>
          </div>
          <div id="notify-bands" class="rule-rows"></div>
          <div id="notify-warning" class="notify-warning"></div>
        </div>

        <div class="actions">
          <button class="primary" id="submit" type="submit">覆盖保存订阅</button>
          <button id="unsubscribe" type="button">取消订阅</button>
        </div>
      </form>
    </section>
    <footer>数据源 Wolfx.jp · 本页仅从当前浏览器恢复已填写内容</footer>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
  <script>
    const api = (window.EEW_API_BASE || window.location.origin).replace(/\/$/, "");
    const storageKey = "eew_subscription_draft_v2";
    const form = document.querySelector("#subscribe-form");
    const barkInput = document.querySelector("#bark-id");
    const nameInput = document.querySelector("#location-name");
    const latInput = document.querySelector("#latitude");
    const lonInput = document.querySelector("#longitude");
    const locationsList = document.querySelector("#locations-list");
    const notifyBandsEl = document.querySelector("#notify-bands");
    const notifyWarning = document.querySelector("#notify-warning");
    const statusEl = document.querySelector("#status");
    const submit = document.querySelector("#submit");
    const unsubscribe = document.querySelector("#unsubscribe");
    const locate = document.querySelector("#locate");
    const addLocation = document.querySelector("#add-location");
    const stats = document.querySelector("#stats");
    const notifyLevelOrder = ["passive", "active", "critical"];
    let selectedLocations = [];
    let notifyBands = defaultNotifyBands();
    let marker = null;

    const map = L.map("map", { zoomControl: false, attributionControl: false }).setView([35, 105], 4);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", { maxZoom: 19 }).addTo(map);

    function show(message, type = "info") {
      statusEl.textContent = message;
      statusEl.className = "status visible " + type;
    }

    function setNotifyWarning(message = "") {
      notifyWarning.textContent = message;
      notifyWarning.classList.toggle("show", Boolean(message));
    }

    function validCoordinate(lat, lon) {
      return Number.isFinite(lat) && Number.isFinite(lon) && lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180;
    }

    function setPosition(lat, lon, zoom = 10) {
      lat = Number(lat);
      lon = Number(lon);
      if (!validCoordinate(lat, lon)) return;
      latInput.value = lat.toFixed(4);
      lonInput.value = lon.toFixed(4);
      if (marker) marker.setLatLng([lat, lon]);
      else marker = L.marker([lat, lon]).addTo(map);
      map.setView([lat, lon], zoom);
    }

    function locationLabel(location) {
      const name = String(location.name || "").trim();
      return name || `${Number(location.latitude).toFixed(4)}, ${Number(location.longitude).toFixed(4)}`;
    }

    function formatCoordinate(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(4) : "";
    }

    function normalizeLocations(items) {
      const seen = new Set();
      const result = [];
      for (const item of items || []) {
        const lat = Number(item.latitude);
        const lon = Number(item.longitude);
        if (!validCoordinate(lat, lon)) continue;
        const key = `${lat.toFixed(4)},${lon.toFixed(4)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        result.push({ name: String(item.name || "").trim(), latitude: lat, longitude: lon });
        if (result.length >= 3) break;
      }
      return result;
    }

    function renderLocations() {
      selectedLocations = normalizeLocations(selectedLocations);
      if (!selectedLocations.length) {
        locationsList.innerHTML = '<div class="locations-empty">尚未添加监测地点，点击地图、定位，或输入经纬度后添加</div>';
        return;
      }
      locationsList.innerHTML = selectedLocations.map((item, index) => `
        <div class="location-item" data-index="${escapeHtml(index)}">
          <div>
            <div class="location-name">${escapeHtml(locationLabel(item))}</div>
            <div class="location-coords">${escapeHtml(formatCoordinate(item.latitude))}, ${escapeHtml(formatCoordinate(item.longitude))}</div>
          </div>
          <button class="remove-location" type="button" data-action="remove" aria-label="删除地点">×</button>
        </div>
      `).join("");
    }

    function addCurrentLocation() {
      const lat = Number(latInput.value);
      const lon = Number(lonInput.value);
      if (!validCoordinate(lat, lon)) return show("请输入有效经纬度", "error");
      const nameError = validateLocationNames([{ name: nameInput.value, latitude: lat, longitude: lon }]);
      if (nameError) return show(nameError, "error");
      if (selectedLocations.length >= 3) return show("最多添加 3 个监测地点", "error");
      selectedLocations = normalizeLocations([...selectedLocations, { name: nameInput.value, latitude: lat, longitude: lon }]);
      renderLocations();
      persistDraft();
      show("已添加监测地点", "success");
    }

    function defaultNotifyBands() {
      return [
        { min: 1, max: 1, level: "passive", label: "低烈度" },
        { min: 2, max: 2, level: "active", label: "中等烈度" },
        { min: 3, max: 99, level: "critical", label: "高烈度" },
      ];
    }

    function levelLabel(level) {
      return level === "critical" ? "Critical" : level === "active" ? "Active" : "Passive";
    }

    function normalizeBands(bands) {
      const result = [];
      const usedLevels = new Set();
      for (const band of bands || []) {
        const level = notifyLevelOrder.includes(String(band.level || "").toLowerCase()) ? String(band.level).toLowerCase() : "passive";
        if (usedLevels.has(level)) continue;
        usedLevels.add(level);
        let min = clampInt(band.min, 0, 7, 0);
        let max = String(band.max).includes("+") ? 99 : clampInt(band.max, 0, 99, level === "critical" ? 99 : min);
        result.push({ min, max, level, label: String(band.label || levelLabel(level)).trim() });
        if (result.length >= 3) break;
      }
      return result.length ? result.sort((a, b) => a.min - b.min) : defaultNotifyBands();
    }

    function clampInt(value, min, max, fallback) {
      const number = Number.parseInt(value, 10);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function validateLocationNames(locations) {
      for (const location of locations) {
        if (String(location.name || "").trim().length > 80) return "监测地点名称最多 80 个字符";
      }
      return "";
    }

    function validateBands(bands) {
      if (!bands.length) return "请至少保留一条通知级别规则";
      const levels = new Set();
      const used = new Set();
      for (const band of bands) {
        if (!notifyLevelOrder.includes(band.level)) return "通知级别无效";
        if (levels.has(band.level)) return "每个通知级别只能添加一条规则";
        levels.add(band.level);
        if (band.min > band.max || band.min < 0 || band.max > 99) return "烈度范围无效";
        if (band.level === "critical" && band.max < 7) return "Critical 规则上限必须覆盖 7+";
        if (String(band.label || "").trim().length > 32) return "通知级别标签最多 32 个字符";
        for (let value = band.min; value <= band.max; value++) {
          if (used.has(value)) return "烈度范围不能重叠";
          used.add(value);
        }
      }
      return "";
    }

    function renderNotifyBands() {
      notifyBands = normalizeBands(notifyBands);
      notifyBandsEl.innerHTML = notifyBands.map((band, index) => `
        <div class="rule-row" data-index="${escapeHtml(index)}">
          <div class="range-fields">
            <input class="band-min" type="number" min="0" max="7" step="1" value="${escapeHtml(band.min)}" aria-label="起始烈度">
            <span>到</span>
            <input class="band-max" type="text" inputmode="numeric" value="${escapeHtml(band.max >= 99 ? "7+" : band.max)}" aria-label="最高烈度">
          </div>
          <select class="band-select level-${escapeHtml(band.level)}" aria-label="通知级别">
            ${notifyLevelOrder.map((level) => `<option value="${escapeHtml(level)}" ${level === band.level ? "selected" : ""}>${escapeHtml(levelLabel(level))}</option>`).join("")}
          </select>
          <button class="remove-rule" type="button" data-action="remove-rule" aria-label="删除规则">×</button>
        </div>
      `).join("");
    }

    function collectBands() {
      const bands = [];
      notifyBandsEl.querySelectorAll(".rule-row").forEach((row) => {
        const level = row.querySelector(".band-select").value;
        const min = clampInt(row.querySelector(".band-min").value, 0, 7, 0);
        const maxText = row.querySelector(".band-max").value.trim();
        const max = maxText === "7+" ? 99 : clampInt(maxText, 0, 99, level === "critical" ? 99 : 7);
        bands.push({ min, max, level, label: levelLabel(level) });
      });
      return normalizeBands(bands);
    }

    function commitBands(showWarning = false) {
      notifyBands = collectBands();
      const error = validateBands(notifyBands);
      setNotifyWarning(error || "");
      renderNotifyBands();
      if (showWarning && !error) persistDraft();
      return !error;
    }

    function persistDraft() {
      const draft = {
        current: { name: nameInput.value.trim(), latitude: Number(latInput.value), longitude: Number(lonInput.value) },
        locations: selectedLocations,
        notify_bands: notifyBands,
      };
      localStorage.setItem(storageKey, JSON.stringify(draft));
    }

    function restoreDraft() {
      const draft = safeJson(localStorage.getItem(storageKey)) || {};
      if (draft.bark_id) {
        delete draft.bark_id;
        localStorage.setItem(storageKey, JSON.stringify(draft));
      }
      selectedLocations = normalizeLocations(draft.locations || []);
      notifyBands = normalizeBands(draft.notify_bands || defaultNotifyBands());
      const current = draft.current || selectedLocations[0];
      if (current) {
        nameInput.value = current.name || "";
        setPosition(current.latitude, current.longitude, 10);
      }
      renderLocations();
      renderNotifyBands();
    }

    function safeJson(value) {
      try { return value ? JSON.parse(value) : null; } catch { return null; }
    }

    async function parseApiResponse(res) {
      const text = await res.text();
      const json = safeJson(text);
      if (json && typeof json === "object") return json;
      return { success: res.ok, message: text.trim() || res.statusText || "请求失败" };
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
    }

    map.on("click", (event) => {
      setPosition(event.latlng.lat, event.latlng.lng);
      persistDraft();
    });

    locate.addEventListener("click", () => {
      if (!navigator.geolocation) return show("当前浏览器不支持定位", "error");
      locate.disabled = true;
      show("正在获取定位...", "info");
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          setPosition(pos.coords.latitude, pos.coords.longitude, 12);
          if (!nameInput.value.trim()) nameInput.value = "当前位置";
          persistDraft();
          show("定位成功", "success");
          locate.disabled = false;
        },
        () => {
          show("定位失败，请点击地图或输入经纬度", "error");
          locate.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 9000 }
      );
    });

    addLocation.addEventListener("click", addCurrentLocation);

    locationsList.addEventListener("click", (event) => {
      const row = event.target.closest(".location-item");
      if (!row) return;
      const index = Number(row.dataset.index);
      if (event.target.closest("[data-action='remove']")) {
        selectedLocations.splice(index, 1);
        renderLocations();
        persistDraft();
        return show("已删除监测地点", "success");
      }
      const item = selectedLocations[index];
      if (!item) return;
      nameInput.value = item.name || "";
      setPosition(item.latitude, item.longitude, 12);
      persistDraft();
    });

    [nameInput, latInput, lonInput].forEach((input) => input.addEventListener("input", persistDraft));

    document.querySelector("#add-rule").addEventListener("click", () => {
      if (!commitBands()) return;
      const used = new Set(notifyBands.map((band) => band.level));
      const level = notifyLevelOrder.find((item) => !used.has(item));
      if (!level) return setNotifyWarning("通知级别规则最多 3 条");
      notifyBands.push({ min: level === "passive" ? 0 : level === "active" ? 2 : 3, max: level === "critical" ? 99 : level === "active" ? 2 : 1, level, label: levelLabel(level) });
      renderNotifyBands();
      persistDraft();
    });

    document.querySelector("#reset-rules").addEventListener("click", () => {
      notifyBands = defaultNotifyBands();
      setNotifyWarning("");
      renderNotifyBands();
      persistDraft();
    });

    notifyBandsEl.addEventListener("change", () => commitBands(true));
    notifyBandsEl.addEventListener("blur", (event) => {
      if (event.target.closest(".band-min, .band-max")) commitBands(true);
    }, true);
    notifyBandsEl.addEventListener("click", (event) => {
      const remove = event.target.closest("[data-action='remove-rule']");
      if (!remove) return;
      notifyBands = collectBands();
      notifyBands.splice(Number(remove.closest(".rule-row").dataset.index), 1);
      if (!notifyBands.length) notifyBands = defaultNotifyBands();
      renderNotifyBands();
      persistDraft();
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!commitBands()) return show("请修正通知级别规则", "error");
      let locations = normalizeLocations(selectedLocations);
      if (!locations.length) {
        const lat = Number(latInput.value);
        const lon = Number(lonInput.value);
        if (validCoordinate(lat, lon)) locations = normalizeLocations([{ name: nameInput.value, latitude: lat, longitude: lon }]);
      }
      if (!locations.length) return show("请至少添加一个监测地点", "error");
      const nameError = validateLocationNames(locations);
      if (nameError) return show(nameError, "error");
      const barkID = barkInput.value.trim();
      if (!/^[A-Za-z0-9]{1,64}$/.test(barkID)) return show("Bark Key 只能包含字母和数字", "error");
      const payload = {
        bark_id: barkID,
        location_name: locations[0].name,
        latitude: Number(locations[0].latitude),
        longitude: Number(locations[0].longitude),
        locations,
        notify_bands: notifyBands,
      };
      submit.disabled = true;
      show("正在覆盖保存订阅...", "info");
      try {
        const res = await fetch(api + "/api/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const json = await parseApiResponse(res);
        if (!res.ok || !json.success) throw new Error(json.message || "保存失败");
        selectedLocations = locations;
        persistDraft();
        renderLocations();
        show("订阅已覆盖保存", "success");
        refreshStats();
      } catch (error) {
        show(error.message || "网络请求失败", "error");
      } finally {
        submit.disabled = false;
      }
    });

    unsubscribe.addEventListener("click", async () => {
      const barkID = barkInput.value.trim();
      if (!barkID) return show("请先填写 Bark Key", "error");
      if (!confirm("确定取消订阅？")) return;
      unsubscribe.disabled = true;
      show("正在取消订阅...", "info");
      try {
        const res = await fetch(api + "/api/unsubscribe", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bark_id: barkID }),
        });
        const json = await parseApiResponse(res);
        if (!res.ok || !json.success) throw new Error(json.message || "取消失败");
        localStorage.removeItem(storageKey);
        selectedLocations = [];
        renderLocations();
        form.reset();
        if (marker) { map.removeLayer(marker); marker = null; }
        show("已取消订阅", "success");
        refreshStats();
      } catch (error) {
        show(error.message || "网络请求失败", "error");
      } finally {
        unsubscribe.disabled = false;
      }
    });

    async function refreshStats() {
      try {
        const res = await fetch(api + "/api/stats");
        const json = await parseApiResponse(res);
        stats.textContent = json.success && json.data ? `${json.data.total_subscriptions} 人订阅` : "状态未知";
      } catch {
        stats.textContent = "状态未知";
      }
    }

    restoreDraft();
    refreshStats();
  </script>
</body>
</html>

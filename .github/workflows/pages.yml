name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare static frontend
        env:
          DISASTER_API_BASE: ${{ vars.DISASTER_API_BASE }}
        run: |
          set -euo pipefail
          if [ -z "${DISASTER_API_BASE}" ]; then
            echo "::error::Set repository variable DISASTER_API_BASE to the HTTPS API origin, for example https://api.alerts.example.com"
            exit 1
          fi
          case "${DISASTER_API_BASE}" in
            https://*) ;;
            *)
              echo "::error::DISASTER_API_BASE must start with https://"
              exit 1
              ;;
          esac
          rm -rf public
          mkdir -p public
          cp -R web/. public/
          rm -f public/config.example.js
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          api_base = os.environ["DISASTER_API_BASE"].strip().rstrip("/")
          index_path = Path("public/index.html")
          index_path.write_text(
              index_path.read_text(encoding="utf-8").replace("__DISASTER_ALERT_INSTANCE_NOTICE__", ""),
              encoding="utf-8",
          )
          Path("public/config.js").write_text(
              f"window.DISASTER_API_BASE = {json.dumps(api_base)};\n",
              encoding="utf-8",
          )
          Path("public/.nojekyll").write_text("", encoding="utf-8")
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
